name: Scrape & Deploy Cartelera CABA

on:
  schedule:
    # GitHub usa UTC. Argentina = UTC-3 -> corre 08:00 y 15:00 ART
    - cron: "0 11 * * *"
    - cron: "0 18 * * *"
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrapear cartelera (sin dependencias)
        run: python3 scrape.py --workers 8

      - name: Sincronizar docs/
        run: |
          cp web/index.html docs/index.html
          mkdir -p docs/data
          cp data/cartelera.json data/cartelera.csv docs/data/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deploy
        uses: actions/deploy-pages@v4
